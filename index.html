<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrintZone — 3D Принтеры</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-printer-fill me-2"></i>PrintZone
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted small d-none d-md-inline">3D принтеры нового поколения</span>
        <button class="btn btn-cart position-relative" id="cartBtn">
          <i class="bi bi-bag-fill"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </nav>

  <section class="hero-section">
    <div class="container text-center">
      <p class="hero-label">Лучшие цены · Быстрая доставка</p>
      <h1 class="hero-title">Печатай<br/>будущее</h1>
      <p class="hero-sub">Профессиональные и домашние 3D принтеры с гарантией</p>
      <a href="#catalog" class="btn btn-hero">Смотреть каталог <i class="bi bi-arrow-down ms-1"></i></a>
    </div>
  </section>

  <section id="catalog" class="py-4 filter-bar">
    <div class="container">
      <div class="d-flex flex-wrap gap-2 align-items-center">
        <span class="filter-label">Фильтр:</span>
        <button class="btn btn-filter active" data-cat="all">Все</button>
        <button class="btn btn-filter" data-cat="home">Домашние</button>
        <button class="btn btn-filter" data-cat="pro">Профи</button>
        <button class="btn btn-filter" data-cat="resin">Смоляные</button>
        <div class="ms-auto">
          <select class="form-select form-select-sm sort-select" id="sortSelect">
            <option value="default">По умолчанию</option>
            <option value="price-asc">Цена ↑</option>
            <option value="price-desc">Цена ↓</option>
            <option value="rating">По рейтингу</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <main class="py-5">
    <div class="container">
      <div class="row g-4" id="productGrid"></div>
      <p class="text-center text-muted mt-5 d-none" id="emptyMsg">Ничего не найдено</p>
    </div>
  </main>

  <div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content modal-dark">
        <div class="modal-header border-0">
          <h5 class="modal-title"><i class="bi bi-bag-fill me-2"></i>Корзина</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="cartBody">
          <p class="text-muted text-center py-4">Корзина пуста</p>
        </div>
        <div class="modal-footer border-0 d-flex justify-content-between align-items-center">
          <span class="fw-bold fs-5" id="cartTotal">Итого: 0 ₽</span>
          <button class="btn btn-accent" id="checkoutBtn">Оформить заказ</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg">Добавлено в корзину</div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <footer class="py-4 footer-bar">
    <div class="container text-center text-muted small">
      © 2026 PrintZone · Все права защищены
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
